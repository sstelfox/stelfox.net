{% extends "base.html" %}

{% block content %}
<article class="post">
  <h1>{{ section.title }}</h1>
  {%- if section.date -%}
  <p class="meta">Posted on <span class="postdate">{{ page.date | date(format="%A, %B %-d, %Y") }}</span></p>
  {%- endif -%}

  <div class="post-content">{{ section.content | safe }}</div>
</article>
{% endblock content %}
