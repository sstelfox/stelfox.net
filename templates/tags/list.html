{% extends "index.html" %}

{% block content %}
<div>
  <div>{{ terms | length }} tags in total</div>
  <ul>
    {% for tag in terms %}
    {% set tag_count = tag.pages | length %}

    {% if tag_count >= config.extra.tag_threshold %}
    <li><a href="{{ tag.permalink }}">{{ tag.name }} <span class="tag-count">({{ tag_count }})</span></a></li>
    {% endif %}
    {% endfor %}
  </ul>
</div>
{% endblock content %}
