{{- $id := .Get "id" | default (.Get 0) -}}
{{- $title := .Get "title" | default "YouTube video" -}}
<div class="youtube-embed">
  <iframe
    src="https://www.youtube-nocookie.com/embed/{{ $id }}"
    title="{{ $title }}"
    allow="encrypted-media"
    allowfullscreen
    loading="lazy">
  </iframe>
</div>
