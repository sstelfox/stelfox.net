{{ define "head_extra" }}
<link rel="stylesheet" href="/css/search.css">
{{ end }}

{{ define "main" }}
<div class="container">
  <article class="content">
    <header class="content-header">
      <h1>{{ .Title }}</h1>
    </header>

    {{- if .Content }}
    <div class="content-body">
      {{ .Content }}
    </div>
    {{- end }}

    <div class="search-container">
      <div class="search-input-wrapper">
        <input
          type="text"
          id="search-input"
          class="search-input"
          placeholder="Loading search index..."
          disabled
          autocomplete="off"
        >
        <button id="search-clear" class="search-clear" aria-label="Clear search">×</button>
      </div>

      <div class="search-filters">
        <button class="section-filter active" data-section="all">All</button>
        <button class="section-filter" data-section="blog">Blog</button>
        <button class="section-filter" data-section="notes">Notes</button>
        <button class="section-filter" data-section="projects">Projects</button>
      </div>

      <div id="search-count" class="search-count"></div>
      <div id="search-results" class="search-results"></div>
    </div>
  </article>
</div>
{{ end }}

{{ define "scripts" }}
<script src="/js/lunr.min.js"></script>
<script src="/js/search.js"></script>
{{ end }}
