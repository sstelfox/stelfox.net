{{- if or .Params.mathjax (findRE "\\$\\$" .RawContent 1) }}
<script>
MathJax = {
  tex: {
    displayMath: [['$$', '$$']],
    inlineMath: [['$', '$']]
  },
  svg: {
    fontCache: 'global'
  }
};
</script>
{{- $mathjax := resources.Get "js/mathjax.tex-svg.dist.min.js" | fingerprint }}
<script src="{{ $mathjax.RelPermalink }}" integrity="{{ $mathjax.Data.Integrity }}"></script>
{{- end }}
