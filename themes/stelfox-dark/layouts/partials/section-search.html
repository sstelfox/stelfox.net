{{- $section := .section -}}
{{- $placeholder := .placeholder -}}
<section class="section-search">
  <p class="section-search-nudge">Looking for something specific?</p>
  <form class="section-search-form" action="/search/" method="get">
    <input type="hidden" name="section" value="{{ $section }}">
    <input
      type="text"
      name="q"
      class="section-search-input"
      placeholder="{{ $placeholder }}"
      autocomplete="off"
    >
  </form>
</section>
