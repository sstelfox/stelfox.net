<header class="site-header">
  <div class="container">
    <div class="header-content">
      <a href="/" class="site-title">{{ .Site.Title }}</a>
      <nav class="main-nav">
        {{- range .Site.Menus.main }}
        <a href="{{ .URL }}" {{ if $.IsMenuCurrent "main" . }}class="active"{{ end }}>{{ .Name }}</a>
        {{- end }}
      </nav>
    </div>
  </div>
</header>
