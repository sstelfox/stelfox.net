<footer class="site-footer">
  <div class="container">
    {{- partial "random-quote.html" (dict "featured_only" false) -}}
    {{- if .Site.Params.social }}
    <div class="social-links">
      {{- range .Site.Params.social }}
      <a href="{{ .url }}" title="{{ .name }}" rel="noopener noreferrer" target="_blank">{{ .name }}</a>
      {{- end }}
      <a href="#" id="random-page-link" class="random-page-link" title="Go to a random page" aria-label="Go to a random page">
        <svg class="dice-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="20" height="20" aria-hidden="true">
          <rect x="5" y="5" width="40" height="40" rx="6" fill="none" stroke="currentColor" stroke-width="4"/>
          <rect x="55" y="55" width="40" height="40" rx="6" fill="none" stroke="currentColor" stroke-width="4"/>
          <circle cx="17" cy="17" r="4" fill="currentColor"/>
          <circle cx="33" cy="17" r="4" fill="currentColor"/>
          <circle cx="17" cy="33" r="4" fill="currentColor"/>
          <circle cx="33" cy="33" r="4" fill="currentColor"/>
          <circle cx="75" cy="67" r="4" fill="currentColor"/>
          <circle cx="75" cy="83" r="4" fill="currentColor"/>
          <circle cx="75" cy="75" r="4" fill="currentColor"/>
        </svg>
      </a>
    </div>
    {{- end }}
    <div class="copyright">
      {{- if .Site.Copyright }}
      {{ replace .Site.Copyright "© 2008" (printf "© 2008-%s" (now.Format "2006")) }}
      {{- end }}
    </div>
  </div>
</footer>
