# Tag metadata for the /tags/ overview page.
#
# Every tag used in content frontmatter must have an entry here. The justfile
# `check-tags` recipe will fail the build if any tag is missing.
#
# Fields:
#   category:    Grouping shown on the /tags/ page
#   description: One-sentence summary shown next to the tag

